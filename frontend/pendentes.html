<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pendentes - Sistema de Caixa</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #0f172a;
      color: #f8fafc;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .topo {
      background: linear-gradient(135deg, #111827, #1f2937);
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .topo h1 {
      font-size: 30px;
      margin-bottom: 8px;
    }

    .topo p {
      color: #cbd5e1;
    }

    .acoes {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-blue {
      background: #2563eb;
      color: white;
    }

    .btn-blue:hover {
      background: #1d4ed8;
    }

    .btn-green {
      background: #16a34a;
      color: white;
    }

    .btn-green:hover {
      background: #15803d;
    }

    .resumo {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .resumo h2 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .resumo p {
      color: #cbd5e1;
      font-size: 16px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }

    .card {
      background: #111827;
      border: 1px solid #334155;
      border-left: 5px solid #ef4444;
      border-radius: 18px;
      padding: 22px;
    }

    .card h3 {
      font-size: 22px;
      margin-bottom: 14px;
      color: #e2e8f0;
    }

    .card p {
      margin-bottom: 8px;
      color: #cbd5e1;
      font-size: 15px;
      line-height: 1.5;
    }

    .card strong {
      color: #f8fafc;
    }

    .acoes-card {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .vazio {
      color: #cbd5e1;
      font-size: 16px;
      margin-top: 12px;
    }

    .erro {
      margin-top: 10px;
      color: #fca5a5;
      font-weight: bold;
    }

    @media (max-width: 768px) {
      .resumo h2 {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topo">
      <div>
        <h1>Pagamentos Pendentes 💰</h1>
        <p>Controle de clientes que ainda não pagaram</p>
      </div>

      <div class="acoes">
        <a class="btn btn-blue" href="/">Voltar para Caixa</a>
        <a class="btn btn-blue" href="/dashboard.html">Ver Dashboard</a>
      </div>
    </div>

    <div class="resumo">
      <h2 id="totalPendente">R$ 0,00</h2>
      <p id="quantidadePendentes">0 pendências encontradas</p>
      <p class="erro" id="mensagemErro"></p>
    </div>

    <div class="cards" id="listaPendentes"></div>
  </div>

  <script>
    const API_URL = "https://controle-caixa-bd9p.onrender.com";

    function formatarMoeda(valor) {
      return Number(valor).toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    async function carregarPendentes() {
      try {
        const resposta = await fetch(`${API_URL}/pedidos`, {
          method: "GET",
          cache: "no-store"
        });

        if (!resposta.ok) {
          throw new Error("Erro ao buscar pedidos");
        }

        const pedidos = await resposta.json();

        const pendentes = pedidos.filter(
          pedido =>
            pedido.forma_pagamento === "Pendente / Fiado" &&
            pedido.status !== "Cancelado"
        );

        const totalPendente = pendentes.reduce(
          (acc, pedido) => acc + Number(pedido.total || 0),
          0
        );

        document.getElementById("totalPendente").textContent = formatarMoeda(totalPendente);
        document.getElementById("quantidadePendentes").textContent = `${pendentes.length} pendência(s) encontrada(s)`;
        document.getElementById("mensagemErro").textContent = "";

        const listaPendentes = document.getElementById("listaPendentes");
        listaPendentes.innerHTML = "";

        if (pendentes.length === 0) {
          listaPendentes.innerHTML = '<p class="vazio">Nenhum pagamento pendente no momento.</p>';
          return;
        }

        pendentes.forEach(pedido => {
          listaPendentes.innerHTML += `
            <div class="card">
              <h3>Comanda #${pedido.comanda}</h3>
              <p><strong>Cliente:</strong> ${pedido.cliente}</p>
              <p><strong>Item:</strong> ${pedido.item}</p>
              <p><strong>Quantidade:</strong> ${pedido.quantidade}</p>
              <p><strong>Total:</strong> ${formatarMoeda(pedido.total)}</p>
              <p><strong>Status:</strong> ${pedido.status}</p>
              <p><strong>Pagamento:</strong> ${pedido.forma_pagamento}</p>

              <div class="acoes-card">
                <button class="btn btn-green" onclick="marcarComoPago(${pedido.id})">
                  Marcar como pago
                </button>
              </div>
            </div>
          `;
        });
      } catch (erro) {
        document.getElementById("mensagemErro").textContent = "Erro ao carregar pendentes.";
        console.error("Erro em carregarPendentes:", erro);
      }
    }

    async function marcarComoPago(id) {
      const formaPagamento = prompt(
        "Digite a forma de pagamento recebida:\nPix, Dinheiro, Cartão de Crédito ou Cartão de Débito"
      );

      if (!formaPagamento) return;

      const formasValidas = [
        "Pix",
        "Dinheiro",
        "Cartão de Crédito",
        "Cartão de Débito"
      ];

      if (!formasValidas.includes(formaPagamento)) {
        alert("Forma de pagamento inválida.");
        return;
      }

      try {
        const resposta = await fetch(`${API_URL}/pedidos/${id}/pagamento`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            forma_pagamento: formaPagamento
          }),
          cache: "no-store"
        });

        const dados = await resposta.json();

        if (!resposta.ok) {
          alert(dados.erro || "Erro ao atualizar pagamento.");
          return;
        }

        alert("Pagamento atualizado com sucesso.");
        carregarPendentes();
      } catch (erro) {
        alert("Erro ao atualizar pagamento.");
        console.error("Erro em marcarComoPago:", erro);
      }
    }

    carregarPendentes();
    setInterval(carregarPendentes, 5000);
  </script>
</body>
</html>
