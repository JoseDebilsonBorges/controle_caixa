<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pendentes - Sistema de Vendas</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #0f172a;
      color: #f8fafc;
    }

    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #111827;
      border-right: 1px solid #334155;
      padding: 24px 18px;
      position: fixed;
      height: 100vh;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .logo span {
      color: #f43f5e;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu a {
      text-decoration: none;
      color: #e5e7eb;
      background: #1f2937;
      padding: 14px;
      border-radius: 12px;
      font-weight: bold;
    }

    .menu a.ativo,
    .menu a:hover {
      background: #f43f5e;
      color: white;
    }

    .content {
      margin-left: 260px;
      padding: 24px;
      width: 100%;
    }

    .topo {
      background: linear-gradient(135deg, #f43f5e, #be123c);
      padding: 25px;
      border-radius: 18px;
      margin-bottom: 25px;
    }

    .lista {
      display: grid;
      gap: 12px;
    }

    .item {
      background: #111827;
      padding: 15px;
      border-radius: 14px;
      border: 1px solid #334155;
    }

    .btn {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="app-layout">

    <aside class="sidebar">
      <div class="logo">Caixa<span>Web</span></div>

      <nav class="menu">
        <a href="/">Venda rápida</a>
        <a href="/caixa-evento.html" id="menu-pedidos">Pedidos</a>
        <a href="/cozinha.html" id="menu-producao">Produção</a>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/pendentes.html" class="ativo">Pendentes</a>
        <a href="/eventos.html" id="menu-sessoes">Sessões</a>
      </nav>
    </aside>

    <main class="content">

      <div class="topo">
        <h1>Pendentes 💰</h1>
        <p>Controle de clientes que ainda não pagaram</p>
      </div>

      <div id="lista" class="lista"></div>

    </main>
  </div>

<script src="/config.js"></script>
<script>
const API_URL = "https://controle-caixa-bd9p.onrender.com";

function aplicarModoSistema() {
  if (MODO_SISTEMA === "simples") {
    document.getElementById("menu-pedidos").style.display = "none";
    document.getElementById("menu-producao").style.display = "none";
    document.getElementById("menu-sessoes").style.display = "none";
  }
}

async function carregarPendentes() {
  const res = await fetch(`${API_URL}/pedidos`);
  const dados = await res.json();

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const pendentes = dados.filter(p => p.forma_pagamento === "Pendente");

  if (pendentes.length === 0) {
    lista.innerHTML = "<p>Nenhum valor pendente</p>";
    return;
  }

  pendentes.forEach(p => {
    lista.innerHTML += `
      <div class="item">
        <strong>${p.cliente}</strong><br>
        ${p.item} - R$ ${p.total}

        <button class="btn" onclick="receber(${p.id})">
          Marcar como pago
        </button>
      </div>
    `;
  });
}

async function receber(id) {
  await fetch(`${API_URL}/pedidos/${id}/status`, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({status: "Pago"})
  });

  carregarPendentes();
}

aplicarModoSistema();
carregarPendentes();
</script>

</body>
</html>
