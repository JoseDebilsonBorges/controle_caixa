<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venda Rápida - Sistema de Vendas</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #0f172a;
      color: #f8fafc;
    }

    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #111827;
      border-right: 1px solid #334155;
      padding: 24px 18px;
      position: fixed;
      height: 100vh;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .logo span {
      color: #22c55e;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu a {
      text-decoration: none;
      color: #e5e7eb;
      background: #1f2937;
      padding: 14px;
      border-radius: 12px;
      font-weight: bold;
    }

    .menu a.ativo,
    .menu a:hover {
      background: #22c55e;
      color: white;
    }

    .content {
      margin-left: 260px;
      padding: 24px;
      width: 100%;
    }

    .topo {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      padding: 25px;
      border-radius: 18px;
      margin-bottom: 25px;
      color: white;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid #334155;
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #475569;
      background: #0f172a;
      color: white;
    }

    .btn {
      margin-top: 12px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .pedido {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      background: #1f2937;
    }
  </style>
</head>

<body>
  <div class="app-layout">

    <aside class="sidebar">
      <div class="logo">Caixa<span>Web</span></div>

      <nav class="menu">
        <a href="/" class="ativo">Venda rápida</a>
        <a href="/caixa-evento.html" id="menu-pedidos">Pedidos</a>
        <a href="/cozinha.html" id="menu-producao">Produção</a>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/pendentes.html">Pendentes</a>
        <a href="/eventos.html" id="menu-sessoes">Sessões</a>
      </nav>
    </aside>

    <main class="content">

      <div class="topo">
        <h1>Venda Rápida 💰</h1>
        <p>Controle suas vendas de forma simples e rápida</p>
      </div>

      <div class="card">
        <h2>Nova Venda</h2>

        <input id="cliente" placeholder="Cliente">
        <input id="item" placeholder="Produto">

        <input id="quantidade" type="number" placeholder="Quantidade">
        <input id="valor" type="number" placeholder="Valor">

        <select id="pagamento">
          <option value="">Forma de pagamento</option>
          <option>Dinheiro</option>
          <option>Pix</option>
          <option>Cartão</option>
          <option>Pendente</option>
        </select>

        <button class="btn" onclick="criarPedido()">Registrar venda</button>
      </div>

      <div class="card">
        <h2>Vendas registradas</h2>
        <div id="lista"></div>
      </div>

    </main>
  </div>

<script src="/config.js"></script>
<script>
const API_URL = "https://controle-caixa-bd9p.onrender.com";

function aplicarModoSistema() {
  if (MODO_SISTEMA === "simples") {
    document.getElementById("menu-pedidos").style.display = "none";
    document.getElementById("menu-producao").style.display = "none";
    document.getElementById("menu-sessoes").style.display = "none";
  }
}

async function carregar() {
  const res = await fetch(`${API_URL}/pedidos`);
  const dados = await res.json();

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  dados.forEach(p => {
    lista.innerHTML += `
      <div class="pedido">
        ${p.cliente} - ${p.item} (${p.quantidade}) - R$ ${p.total}
      </div>
    `;
  });
}

async function criarPedido() {
  const cliente = document.getElementById("cliente").value;
  const item = document.getElementById("item").value;
  const quantidade = document.getElementById("quantidade").value;
  const valor = document.getElementById("valor").value;
  const formaPagamento = document.getElementById("pagamento").value;

  await fetch(`${API_URL}/pedidos`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      cliente,
      item,
      quantidade,
      valor,
      formaPagamento
    })
  });

  carregar();
}

aplicarModoSistema();
carregar();
</script>
</body>
</html>
