<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Sistema de Vendas</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #0f172a;
      color: #f8fafc;
    }

    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #111827;
      border-right: 1px solid #334155;
      padding: 24px 18px;
      position: fixed;
      height: 100vh;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .logo span {
      color: #a78bfa;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu a {
      text-decoration: none;
      color: #e5e7eb;
      background: #1f2937;
      padding: 14px;
      border-radius: 12px;
      font-weight: bold;
    }

    .menu a.ativo,
    .menu a:hover {
      background: #a78bfa;
      color: white;
    }

    .content {
      margin-left: 260px;
      padding: 24px;
      width: 100%;
    }

    .topo {
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      padding: 25px;
      border-radius: 18px;
      margin-bottom: 25px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid #334155;
    }

    .card h3 {
      margin-bottom: 10px;
      color: #94a3b8;
      font-size: 14px;
    }

    .card strong {
      font-size: 22px;
    }
  </style>
</head>

<body>
  <div class="app-layout">

    <aside class="sidebar">
      <div class="logo">Caixa<span>Web</span></div>

      <nav class="menu">
        <a href="/">Venda rápida</a>
        <a href="/caixa-evento.html" id="menu-pedidos">Pedidos</a>
        <a href="/cozinha.html" id="menu-producao">Produção</a>
        <a href="/dashboard.html" class="ativo">Dashboard</a>
        <a href="/pendentes.html">Pendentes</a>
        <a href="/eventos.html" id="menu-sessoes">Sessões</a>
      </nav>
    </aside>

    <main class="content">

      <div class="topo">
        <h1>Dashboard 📊</h1>
        <p>Visão geral das vendas</p>
      </div>

      <div class="cards">
        <div class="card">
          <h3>Total vendido</h3>
          <strong id="total">R$ 0</strong>
        </div>

        <div class="card">
          <h3>Pedidos realizados</h3>
          <strong id="quantidade">0</strong>
        </div>

        <div class="card">
          <h3>Vendas pendentes</h3>
          <strong id="pendentes">0</strong>
        </div>
      </div>

    </main>
  </div>

<script src="/config.js"></script>
<script>
const API_URL = "https://controle-caixa-bd9p.onrender.com";

function aplicarModoSistema() {
  if (MODO_SISTEMA === "simples") {
    document.getElementById("menu-pedidos").style.display = "none";
    document.getElementById("menu-producao").style.display = "none";
    document.getElementById("menu-sessoes").style.display = "none";
  }
}

async function carregarDashboard() {
  const res = await fetch(`${API_URL}/pedidos`);
  const dados = await res.json();

  let total = 0;
  let pendentes = 0;

  dados.forEach(p => {
    total += Number(p.total);

    if (p.forma_pagamento === "Pendente") {
      pendentes++;
    }
  });

  document.getElementById("total").innerText =
    total.toLocaleString("pt-BR", {style: "currency", currency: "BRL"});

  document.getElementById("quantidade").innerText = dados.length;
  document.getElementById("pendentes").innerText = pendentes;
}

aplicarModoSistema();
carregarDashboard();
</script>

</body>
</html>
