<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventos - Sistema de Caixa</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #0f172a;
      color: #f8fafc;
    }

    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #111827;
      border-right: 1px solid #334155;
      padding: 24px 18px;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 30px;
      color: #ffffff;
    }

    .logo span {
      color: #38bdf8;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu a {
      text-decoration: none;
      color: #e5e7eb;
      background: #1f2937;
      padding: 14px 16px;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.2s;
    }

    .menu a:hover,
    .menu a.ativo {
      background: #0ea5e9;
      color: white;
    }

    .content {
      margin-left: 260px;
      width: calc(100% - 260px);
      padding: 24px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .topo {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .topo h1 {
      font-size: 30px;
      margin-bottom: 8px;
    }

    .topo p {
      color: #cbd5e1;
    }

    .card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 24px;
    }

    .card h2 {
      margin-bottom: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      margin-bottom: 18px;
    }

    input,
    select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #475569;
      border-radius: 12px;
      outline: none;
      font-size: 15px;
      background: #0f172a;
      color: #f8fafc;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      background: #0ea5e9;
      color: white;
    }

    .btn:hover {
      background: #0284c7;
    }

    .lista {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }

    .evento-item {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 18px;
    }

    .evento-item h3 {
      margin-bottom: 12px;
    }

    .evento-item p {
      margin-bottom: 8px;
      color: #cbd5e1;
    }

    .vazio {
      color: #94a3b8;
    }

    @media (max-width: 900px) {
      .app-layout {
        flex-direction: column;
      }

      .sidebar {
        position: relative;
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid #334155;
      }

      .content {
        margin-left: 0;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="logo">Caixa<span>Web</span></div>

      <nav class="menu">
        <a href="/">Caixa</a>
        <a href="/cozinha.html">Cozinha</a>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/pendentes.html">Pendentes</a>
        <a href="/eventos.html" class="ativo">Eventos</a>
      </nav>
    </aside>

    <main class="content">
      <div class="container">
        <div class="topo">
          <h1>Eventos 📅</h1>
          <p>Cadastre os eventos da comunidade ou dos clientes</p>
        </div>

        <div class="card">
          <h2>Novo Evento</h2>

          <form id="formEvento">
            <div class="form-grid">
              <input type="text" id="nomeEvento" placeholder="Nome do evento" required>
              <input type="date" id="dataEvento" required>

              <select id="statusEvento">
                <option value="Aberto">Aberto</option>
                <option value="Fechado">Fechado</option>
              </select>
            </div>

            <button type="submit" class="btn">Cadastrar evento</button>
          </form>
        </div>

        <div class="card">
          <h2>Eventos cadastrados</h2>
          <div id="listaEventos" class="lista"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API_URL = "https://controle-caixa-bd9p.onrender.com";

    const formEvento = document.getElementById("formEvento");
    const listaEventos = document.getElementById("listaEventos");

    async function carregarEventos() {
      try {
        const resposta = await fetch(`${API_URL}/eventos`, {
          method: "GET",
          cache: "no-store"
        });

        const eventos = await resposta.json();

        listaEventos.innerHTML = "";

        if (!eventos.length) {
          listaEventos.innerHTML = '<p class="vazio">Nenhum evento cadastrado ainda.</p>';
          return;
        }

        eventos.forEach(evento => {
          listaEventos.innerHTML += `
            <div class="evento-item">
              <h3>${evento.nome}</h3>
              <p><strong>Data:</strong> ${evento.data_evento}</p>
              <p><strong>Status:</strong> ${evento.status}</p>
            </div>
          `;
        });
      } catch (erro) {
        listaEventos.innerHTML = '<p class="vazio">Erro ao carregar eventos.</p>';
        console.error("Erro ao carregar eventos:", erro);
      }
    }

    formEvento.addEventListener("submit", async function(event) {
      event.preventDefault();

      const nome = document.getElementById("nomeEvento").value;
      const data_evento = document.getElementById("dataEvento").value;
      const status = document.getElementById("statusEvento").value;

      try {
        const resposta = await fetch(`${API_URL}/eventos`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            nome,
            data_evento,
            status
          })
        });

        const dados = await resposta.json();

        if (!resposta.ok) {
          alert(dados.erro || "Erro ao cadastrar evento.");
          return;
        }

        alert("Evento cadastrado com sucesso.");
        formEvento.reset();
        carregarEventos();
      } catch (erro) {
        alert("Erro ao conectar com o servidor.");
        console.error("Erro ao cadastrar evento:", erro);
      }
    });

    carregarEventos();
  </script>
</body>
</html>
