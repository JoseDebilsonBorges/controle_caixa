<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sessões - Sistema de Vendas</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #0f172a;
      color: #f8fafc;
    }

    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #111827;
      border-right: 1px solid #334155;
      padding: 24px 18px;
      position: fixed;
      height: 100vh;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .logo span {
      color: #38bdf8;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu a {
      text-decoration: none;
      color: #e5e7eb;
      background: #1f2937;
      padding: 14px;
      border-radius: 12px;
      font-weight: bold;
    }

    .menu a.ativo,
    .menu a:hover {
      background: #0ea5e9;
      color: white;
    }

    .content {
      margin-left: 260px;
      padding: 24px;
      width: 100%;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
      border: 1px solid #334155;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #475569;
      background: #0f172a;
      color: white;
    }

    .btn {
      margin-top: 12px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #0ea5e9;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .evento-item {
      margin-top: 15px;
      padding: 15px;
      border-radius: 12px;
      background: #0f172a;
      border: 1px solid #334155;
    }

    .produto-item {
      margin-top: 8px;
      padding: 10px;
      border-radius: 10px;
      background: #111827;
    }
  </style>
</head>

<body>
  <div class="app-layout">

    <aside class="sidebar">
      <div class="logo">Caixa<span>Web</span></div>

      <nav class="menu">
        <a href="/">Venda rápida</a>
        <a href="/caixa-evento.html">Pedidos</a>
        <a href="/cozinha.html">Produção</a>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/pendentes.html">Pendentes</a>
        <a href="/eventos.html" class="ativo">Sessões</a>
      </nav>
    </aside>

    <main class="content">

      <div class="card">
        <h2>Nova Sessão</h2>

        <form id="formEvento">
          <input type="text" id="nomeEvento" placeholder="Nome da sessão" required>
          <input type="date" id="dataEvento" required>

          <select id="statusEvento">
            <option value="Aberto">Aberto</option>
            <option value="Fechado">Fechado</option>
          </select>

          <button type="submit" class="btn">Cadastrar sessão</button>
        </form>
      </div>

      <div class="card">
        <h2>Sessões cadastradas</h2>
        <div id="listaEventos"></div>
      </div>

    </main>
  </div>

<script>
const API_URL = "https://controle-caixa-bd9p.onrender.com";

const listaEventos = document.getElementById("listaEventos");

async function carregarEventos() {
  const res = await fetch(`${API_URL}/eventos`);
  const eventos = await res.json();

  listaEventos.innerHTML = "";

  eventos.forEach(evento => {
    listaEventos.innerHTML += `
      <div class="evento-item">
        <h3>${evento.nome}</h3>
        <p>${evento.data_evento}</p>

        <input id="nome-${evento.id}" placeholder="Produto">
        <input id="preco-${evento.id}" type="number" placeholder="Preço">

        <button class="btn" onclick="addProduto(${evento.id})">Adicionar produto</button>

        <div id="produtos-${evento.id}"></div>
      </div>
    `;

    carregarProdutos(evento.id);
  });
}

async function carregarProdutos(id) {
  const res = await fetch(`${API_URL}/eventos/${id}/produtos`);
  const produtos = await res.json();

  const div = document.getElementById(`produtos-${id}`);
  div.innerHTML = "";

  produtos.forEach(p => {
    div.innerHTML += `<div class="produto-item">${p.nome} - R$ ${p.preco}</div>`;
  });
}

async function addProduto(id) {
  const nome = document.getElementById(`nome-${id}`).value;
  const preco = document.getElementById(`preco-${id}`).value;

  await fetch(`${API_URL}/eventos/${id}/produtos`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({nome, preco})
  });

  carregarEventos();
}

document.getElementById("formEvento").addEventListener("submit", async e => {
  e.preventDefault();

  const nome = document.getElementById("nomeEvento").value;
  const data_evento = document.getElementById("dataEvento").value;
  const status = document.getElementById("statusEvento").value;

  await fetch(`${API_URL}/eventos`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({nome, data_evento, status})
  });

  carregarEventos();
});

carregarEventos();
</script>
</body>
</html>
