<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozinha - Sistema de Caixa</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #0f172a;
      color: #f8fafc;
    }

    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #111827;
      border-right: 1px solid #334155;
      padding: 24px 18px;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 30px;
      color: #ffffff;
    }

    .logo span {
      color: #f97316;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu a {
      text-decoration: none;
      color: #e5e7eb;
      background: #1f2937;
      padding: 14px 16px;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.2s;
    }

    .menu a:hover,
    .menu a.ativo {
      background: #ea580c;
      color: white;
    }

    .content {
      margin-left: 260px;
      width: calc(100% - 260px);
      padding: 24px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .topo {
      background: linear-gradient(135deg, #ea580c, #f97316);
      color: white;
      padding: 25px;
      border-radius: 18px;
      margin-bottom: 25px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
    }

    .topo h1 {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .topo p {
      opacity: 0.95;
    }

    .section-card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    .section-card h2 {
      margin-bottom: 18px;
      color: #f8fafc;
    }

    .pedidos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }

    .pedido-card {
      background: #1c1917;
      border: 1px solid #7c2d12;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.04);
    }

    .pedido-card h3 {
      color: #fdba74;
      margin-bottom: 12px;
      font-size: 20px;
    }

    .pedido-card p {
      margin-bottom: 8px;
      font-size: 14px;
      line-height: 1.4;
      color: #e5e7eb;
    }

    .status {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      margin-top: 6px;
    }

    .status-pendente {
      background: #fef3c7;
      color: #92400e;
    }

    .status-em-preparo {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .status-pronto {
      background: #dcfce7;
      color: #166534;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 10px;
      margin-right: 8px;
    }

    .btn-blue {
      background: #2563eb;
      color: white;
    }

    .btn-blue:hover {
      background: #1d4ed8;
    }

    .btn-green {
      background: #16a34a;
      color: white;
    }

    .btn-green:hover {
      background: #15803d;
    }

    .btn-gray {
      background: #4b5563;
      color: white;
    }

    .btn-gray:hover {
      background: #374151;
    }

    .vazio {
      color: #94a3b8;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .app-layout {
        flex-direction: column;
      }

      .sidebar {
        position: relative;
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid #334155;
      }

      .content {
        margin-left: 0;
        width: 100%;
      }
    }

    @media (max-width: 768px) {
      .content {
        padding: 15px;
      }

      .topo h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="logo">Caixa<span>Web</span></div>

      <nav class="menu">
        <a href="/">Caixa</a>
        <a href="/cozinha.html" class="ativo">Cozinha</a>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/pendentes.html">Pendentes</a>
        <a href="/eventos.html">Eventos</a>
      </nav>
    </aside>

    <main class="content">
      <div class="container">
        <div class="topo">
          <h1>🍳 Tela da Cozinha</h1>
          <p>Atualização dos pedidos em andamento</p>
        </div>

        <div class="section-card">
          <h2>Pedidos</h2>
          <div id="pedidos" class="pedidos-grid"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API_URL = "https://controle-caixa-bd9p.onrender.com";
    const lista = document.getElementById("pedidos");

    function classeStatus(status) {
      if (status === "Pendente") return "status status-pendente";
      if (status === "Em preparo") return "status status-em-preparo";
      if (status === "Pronto") return "status status-pronto";
      return "status";
    }

    async function carregarPedidos() {
      try {
        const resposta = await fetch(`${API_URL}/pedidos`, {
          method: "GET",
          cache: "no-store"
        });

        if (!resposta.ok) {
          throw new Error("Erro ao buscar pedidos");
        }

        const pedidos = await resposta.json();

        lista.innerHTML = "";

        const pedidosEmAndamento = pedidos.filter(
          (pedido) => pedido.status !== "Entregue" && pedido.status !== "Cancelado"
        );

        if (pedidosEmAndamento.length === 0) {
          lista.innerHTML = '<p class="vazio">Nenhum pedido no momento.</p>';
          return;
        }

        pedidosEmAndamento.forEach((pedido) => {
          lista.innerHTML += `
            <div class="pedido-card">
              <h3>Comanda #${pedido.comanda}</h3>
              <p><strong>Cliente:</strong> ${pedido.cliente}</p>
              <p><strong>Item:</strong> ${pedido.item}</p>
              <p><strong>Quantidade:</strong> ${pedido.quantidade}</p>
              <p><strong>Forma de pagamento:</strong> ${pedido.forma_pagamento}</p>
              <p><strong>Status:</strong> <span class="${classeStatus(pedido.status)}">${pedido.status}</span></p>

              ${pedido.status === "Pendente"
                ? `<button class="btn btn-blue" onclick="mudarStatus(${pedido.id}, 'Em preparo')">Iniciar preparo</button>`
                : ""}

              ${pedido.status === "Em preparo"
                ? `<button class="btn btn-green" onclick="mudarStatus(${pedido.id}, 'Pronto')">Marcar como pronto</button>`
                : ""}

              ${pedido.status === "Pronto"
                ? `<button class="btn btn-gray" onclick="mudarStatus(${pedido.id}, 'Entregue')">Marcar como entregue</button>`
                : ""}
            </div>
          `;
        });
      } catch (erro) {
        lista.innerHTML = '<p class="vazio">Erro ao carregar pedidos.</p>';
        console.error("Erro em carregarPedidos:", erro);
      }
    }

    async function mudarStatus(id, status) {
      try {
        const resposta = await fetch(`${API_URL}/pedidos/${id}/status`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ status }),
          cache: "no-store"
        });

        const dados = await resposta.json();

        if (!resposta.ok) {
          alert(dados.erro || "Erro ao atualizar status.");
          return;
        }

        carregarPedidos();
      } catch (erro) {
        alert("Erro ao atualizar status.");
        console.error("Erro em mudarStatus:", erro);
      }
    }

    setInterval(carregarPedidos, 4000);
    carregarPedidos();
  </script>
</body>
</html>
