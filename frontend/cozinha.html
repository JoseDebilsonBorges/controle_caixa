<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tela da Cozinha</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #f4f7fb;
      color: #1f2937;
      padding: 30px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .topo {
      background: linear-gradient(135deg, #ea580c, #f97316);
      color: white;
      padding: 25px;
      border-radius: 18px;
      margin-bottom: 25px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
    }

    .topo h1 {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .topo p {
      opacity: 0.95;
    }

    .section-card {
      background: white;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    .section-card h2 {
      margin-bottom: 18px;
      color: #111827;
    }

    .pedidos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }

    .pedido-card {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.04);
    }

    .pedido-card h3 {
      color: #9a3412;
      margin-bottom: 12px;
      font-size: 20px;
    }

    .pedido-card p {
      margin-bottom: 8px;
      font-size: 14px;
      line-height: 1.4;
    }

    .status {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      margin-top: 6px;
    }

    .status-pendente {
      background: #fef3c7;
      color: #92400e;
    }

    .status-em-preparo {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .status-pronto {
      background: #dcfce7;
      color: #166534;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 10px;
      margin-right: 8px;
    }

    .btn-blue {
      background: #2563eb;
      color: white;
    }

    .btn-blue:hover {
      background: #1d4ed8;
    }

    .btn-green {
      background: #16a34a;
      color: white;
    }

    .btn-green:hover {
      background: #15803d;
    }

    .btn-gray {
      background: #4b5563;
      color: white;
    }

    .btn-gray:hover {
      background: #374151;
    }

    .vazio {
      color: #6b7280;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      body {
        padding: 15px;
      }

      .topo h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topo">
      <h1>🍳 Tela da Cozinha</h1>
      <p>Atualização dos pedidos em andamento</p>
    </div>

    <div class="section-card">
      <h2>Pedidos</h2>
      <div id="pedidos" class="pedidos-grid"></div>
    </div>
  </div>

  <script>
    const lista = document.getElementById("pedidos");

    function classeStatus(status) {
      if (status === "Pendente") return "status status-pendente";
      if (status === "Em preparo") return "status status-em-preparo";
      if (status === "Pronto") return "status status-pronto";
      return "status";
    }

    async function carregarPedidos() {
      try {
        const resposta = await fetch("http://localhost:3000/pedidos");
        const pedidos = await resposta.json();

        lista.innerHTML = "";

        const pedidosEmAndamento = pedidos.filter(
          (pedido) => pedido.status !== "Entregue" && pedido.status !== "Cancelado"
        );

        if (pedidosEmAndamento.length === 0) {
          lista.innerHTML = '<p class="vazio">Nenhum pedido no momento.</p>';
          return;
        }

        pedidosEmAndamento.forEach((pedido) => {
          lista.innerHTML += `
            <div class="pedido-card">
              <h3>Comanda #${pedido.comanda}</h3>
              <p><strong>Cliente:</strong> ${pedido.cliente}</p>
              <p><strong>Item:</strong> ${pedido.item}</p>
              <p><strong>Quantidade:</strong> ${pedido.quantidade}</p>
              <p><strong>Forma de pagamento:</strong> ${pedido.forma_pagamento}</p>
              <p><strong>Status:</strong> <span class="${classeStatus(pedido.status)}">${pedido.status}</span></p>

              ${pedido.status === "Pendente"
                ? `<button class="btn btn-blue" onclick="mudarStatus(${pedido.id}, 'Em preparo')">Iniciar preparo</button>`
                : ""}

              ${pedido.status === "Em preparo"
                ? `<button class="btn btn-green" onclick="mudarStatus(${pedido.id}, 'Pronto')">Marcar como pronto</button>`
                : ""}

              ${pedido.status === "Pronto"
                ? `<button class="btn btn-gray" onclick="mudarStatus(${pedido.id}, 'Entregue')">Marcar como entregue</button>`
                : ""}
            </div>
          `;
        });
      } catch (erro) {
        lista.innerHTML = '<p class="vazio">Erro ao carregar pedidos.</p>';
        console.error(erro);
      }
    }

    async function mudarStatus(id, status) {
      try {
        const resposta = await fetch(`http://localhost:3000/pedidos/${id}/status`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ status })
        });

        const dados = await resposta.json();

        if (!resposta.ok) {
          alert(dados.erro || "Erro ao atualizar status.");
          return;
        }

        carregarPedidos();
      } catch (erro) {
        alert("Erro ao atualizar status.");
        console.error(erro);
      }
    }

    setInterval(carregarPedidos, 2000);
    carregarPedidos();
  </script>
</body>
</html>
